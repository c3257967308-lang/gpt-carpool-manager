<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChatGPT 验证码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* ===== 登录页 ===== */
    .login-page { display: block; }
    .login-page.hide { display: none; }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #475569;
      margin-bottom: 36px;
    }

    .input-group {
      margin-bottom: 24px;
    }
    .input-group input {
      width: 100%;
      min-height: 52px;
      border: 1px solid #2d3148;
      border-radius: 12px;
      background: #1a1d27;
      color: #e2e8f0;
      font-size: 16px;
      padding: 0 18px;
      outline: none;
      transition: border-color 0.2s;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
    }
    .input-group input::placeholder { color: #475569; }
    .input-group input:focus { border-color: #6366f1; }

    .btn-enter {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      background: #6366f1;
      color: #fff;
      transition: all 0.2s;
    }
    .btn-enter:hover { background: #5558e6; }
    .btn-enter:active { transform: scale(0.98); }

    .login-error {
      margin-top: 16px;
      font-size: 14px;
      color: #f87171;
      display: none;
    }
    .login-error.show { display: block; }

    /* ===== 验证码页 ===== */
    .code-page { display: none; }
    .code-page.show { display: block; }

    .email-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 28px;
    }
    .email-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .email-value {
      font-size: 16px;
      color: #e2e8f0;
      word-break: break-all;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
    }

    .btn-get {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #6366f1;
      color: #fff;
    }
    .btn-get:hover { background: #5558e6; }
    .btn-get:active { transform: scale(0.98); }
    .btn-get:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
      transform: none;
    }

    .code-area {
      margin-top: 28px;
      display: none;
    }
    .code-area.show { display: block; }
    .code-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .code-value {
      font-size: 48px;
      font-weight: 700;
      color: #6366f1;
      letter-spacing: 8px;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      padding: 20px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      user-select: all;
      cursor: pointer;
    }
    .code-value:active { background: #252836; }
    .copy-hint {
      margin-top: 10px;
      font-size: 13px;
      color: #475569;
      transition: color 0.3s;
    }
    .copy-hint.copied { color: #22c55e; }

    .error-area {
      margin-top: 20px;
      display: none;
    }
    .error-area.show { display: block; }
    .error-msg {
      font-size: 14px;
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 10px;
      padding: 14px 18px;
    }

    .btn-back {
      margin-top: 24px;
      background: none;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #64748b;
      font-size: 14px;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-back:hover { border-color: #6366f1; color: #6366f1; }

    .chatgpt-link {
      display: inline-block;
      margin-top: 20px;
      color: #6366f1;
      font-size: 14px;
      text-decoration: none;
      border-bottom: 1px dashed #6366f1;
      padding-bottom: 2px;
    }
    .chatgpt-link:hover { color: #818cf8; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ===== 第一步：输入邮箱 ===== -->
    <div class="login-page" id="loginPage">
      <div class="title">ChatGPT 验证码获取</div>
      <div class="subtitle">输入你的账号邮箱，获取登录验证码</div>

      <div class="input-group">
        <input type="text" id="emailInput" placeholder="请输入邮箱地址" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>

      <button class="btn-enter" id="btnEnter" onclick="enter()">进入</button>

      <div class="login-error" id="loginError">邮箱地址不正确，请检查后重试</div>
    </div>

    <!-- ===== 第二步：获取验证码 ===== -->
    <div class="code-page" id="codePage">
      <div class="email-box">
        <div class="email-label">当前邮箱</div>
        <div class="email-value" id="emailDisplay">--</div>
      </div>

      <button class="btn-get" id="btnGet" onclick="getCode()">获取验证码</button>

      <div class="code-area" id="codeArea">
        <div class="code-label">验证码</div>
        <div class="code-value" id="codeValue" onclick="copyCode()" title="点击复制"></div>
        <div class="copy-hint" id="copyHint">点击验证码可复制</div>
      </div>

      <div class="error-area" id="errorArea">
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <button class="btn-back" onclick="goBack()">切换邮箱</button>
      <br>
      <a class="chatgpt-link" href="https://chatgpt.com" target="_blank">打开 ChatGPT 登录页</a>
    </div>

  </div>

  <script>
    var API_BASE = 'https://gpt-carpool-bot.vercel.app/api';
    var currentEmail = '';

    // 如果 URL 带了 email 参数，直接跳过输入
    (function init() {
      var params = new URLSearchParams(window.location.search);
      var email = (params.get('email') || '').trim();
      if (email && email.includes('@')) {
        currentEmail = email;
        showCodePage();
      }
      // 回车键进入
      document.getElementById('emailInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') enter();
      });
    })();

    function enter() {
      var email = document.getElementById('emailInput').value.trim();
      var errEl = document.getElementById('loginError');

      if (!email || !email.includes('@') || !email.includes('.')) {
        errEl.classList.add('show');
        return;
      }

      errEl.classList.remove('show');
      currentEmail = email;
      showCodePage();
    }

    function showCodePage() {
      document.getElementById('loginPage').classList.add('hide');
      document.getElementById('codePage').classList.add('show');
      document.getElementById('emailDisplay').textContent = currentEmail;
    }

    function goBack() {
      document.getElementById('codePage').classList.remove('show');
      document.getElementById('loginPage').classList.remove('hide');
      document.getElementById('codeArea').classList.remove('show');
      document.getElementById('errorArea').classList.remove('show');
      document.getElementById('emailInput').value = currentEmail;
    }

    async function getCode() {
      if (!currentEmail) return;

      var btn = document.getElementById('btnGet');
      var codeArea = document.getElementById('codeArea');
      var errorArea = document.getElementById('errorArea');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>正在获取...';
      codeArea.classList.remove('show');
      errorArea.classList.remove('show');

      try {
        var res = await fetch(API_BASE + '/get-code?email=' + encodeURIComponent(currentEmail));
        var data = await res.json();

        if (data.success && data.code) {
          document.getElementById('codeValue').textContent = data.code;
          codeArea.classList.add('show');

          try {
            await navigator.clipboard.writeText(data.code);
            document.getElementById('copyHint').textContent = '已自动复制到剪贴板';
            document.getElementById('copyHint').classList.add('copied');
            setTimeout(function() {
              document.getElementById('copyHint').textContent = '点击验证码可复制';
              document.getElementById('copyHint').classList.remove('copied');
            }, 3000);
          } catch(e) {}
        } else {
          document.getElementById('errorMsg').textContent = data.error || '获取验证码失败，请稍后再试';
          errorArea.classList.add('show');
        }
      } catch (err) {
        document.getElementById('errorMsg').textContent = '网络请求失败，请检查网络后重试';
        errorArea.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = '获取验证码';
      }
    }

    async function copyCode() {
      var code = document.getElementById('codeValue').textContent;
      try {
        await navigator.clipboard.writeText(code);
        document.getElementById('copyHint').textContent = '已复制到剪贴板';
        document.getElementById('copyHint').classList.add('copied');
        setTimeout(function() {
          document.getElementById('copyHint').textContent = '点击验证码可复制';
          document.getElementById('copyHint').classList.remove('copied');
        }, 2000);
      } catch(e) {
        var range = document.createRange();
        range.selectNodeContents(document.getElementById('codeValue'));
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }
  </script>
</body>
</html>
