<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChatGPT 验证码</title>
  <style>
    /* 重置与基础 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* 主容器 */
    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* 标题 */
    .title {
      font-size: 20px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    /* 邮箱显示区 */
    .email-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }
    .email-label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .email-value {
      font-size: 17px;
      color: #e2e8f0;
      word-break: break-all;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
    }

    /* 获取验证码按钮 */
    .btn-get {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #6366f1;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .btn-get:hover { background: #5558e6; }
    .btn-get:active { transform: scale(0.98); }
    .btn-get:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
      transform: none;
    }

    /* 验证码显示区 */
    .code-area {
      margin-top: 28px;
      display: none;
    }
    .code-area.show { display: block; }

    .code-label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .code-value {
      font-size: 48px;
      font-weight: 700;
      color: #6366f1;
      letter-spacing: 8px;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      padding: 20px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      user-select: all;
      cursor: pointer;
      position: relative;
    }
    .code-value:active { background: #252836; }

    .copy-hint {
      margin-top: 10px;
      font-size: 13px;
      color: #475569;
      transition: color 0.3s;
    }
    .copy-hint.copied { color: #22c55e; }

    /* 错误信息 */
    .error-area {
      margin-top: 20px;
      display: none;
    }
    .error-area.show { display: block; }
    .error-msg {
      font-size: 14px;
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 10px;
      padding: 14px 18px;
    }

    /* 加载动画 */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* 无邮箱提示 */
    .no-email {
      color: #f87171;
      font-size: 15px;
    }

    /* 跳转链接 */
    .chatgpt-link {
      display: inline-block;
      margin-top: 24px;
      color: #6366f1;
      font-size: 14px;
      text-decoration: none;
      border-bottom: 1px dashed #6366f1;
      padding-bottom: 2px;
    }
    .chatgpt-link:hover { color: #818cf8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">ChatGPT 验证码获取</div>

    <!-- 邮箱显示 -->
    <div class="email-box">
      <div class="email-label">绑定邮箱</div>
      <div class="email-value" id="emailDisplay">--</div>
    </div>

    <!-- 获取验证码按钮 -->
    <button class="btn-get" id="btnGet" onclick="getCode()">获取验证码</button>

    <!-- 验证码显示 -->
    <div class="code-area" id="codeArea">
      <div class="code-label">验证码</div>
      <div class="code-value" id="codeValue" onclick="copyCode()" title="点击复制"></div>
      <div class="copy-hint" id="copyHint">点击验证码可复制</div>
    </div>

    <!-- 错误信息 -->
    <div class="error-area" id="errorArea">
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- ChatGPT 登录链接 -->
    <a class="chatgpt-link" href="https://chatgpt.com" target="_blank">打开 ChatGPT 登录页</a>
  </div>

  <script>
    // ==================== 初始化 ====================
    const API_BASE = 'https://gpt-carpool-bot.vercel.app/api';
    let currentEmail = '';

    // 从 URL 参数获取邮箱
    (function init() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');
      const user = params.get('user');

      if (email) {
        // 优先使用 ?email= 参数
        currentEmail = email.trim();
        document.getElementById('emailDisplay').textContent = currentEmail;
      } else if (user) {
        // 如果是 ?user= 参数，显示用户ID并尝试从 Supabase 查询
        document.getElementById('emailDisplay').textContent = '正在查询...';
        loadUserEmail(user);
      } else {
        document.getElementById('emailDisplay').innerHTML = '<span class="no-email">请在链接中指定邮箱<br>例: ?email=xxx@outlook.com</span>';
        document.getElementById('btnGet').disabled = true;
      }
    })();

    // ==================== 通过 user 参数查询邮箱 ====================
    async function loadUserEmail(userId) {
      try {
        const SUPABASE_URL = 'https://ebrzdghrzotwrnkimpzi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVicnpkZ2hyem90d3Jua2ltcHppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDQ3NjQsImV4cCI6MjA5NzYyMDc2NH0.29EyMKsL9TYMVRtlUbwPA3pAaFfsJlf3JvfPQRQVZIo';

        const res = await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.${userId}&select=value`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const data = await res.json();

        if (data && data.length > 0 && data[0].value) {
          const parsed = typeof data[0].value === 'string' ? JSON.parse(data[0].value) : data[0].value;
          currentEmail = parsed.email || parsed.chatgpt_email || '';
          if (currentEmail) {
            document.getElementById('emailDisplay').textContent = currentEmail;
          } else {
            document.getElementById('emailDisplay').innerHTML = '<span class="no-email">未找到该用户的邮箱绑定</span>';
            document.getElementById('btnGet').disabled = true;
          }
        } else {
          document.getElementById('emailDisplay').innerHTML = '<span class="no-email">未找到该用户</span>';
          document.getElementById('btnGet').disabled = true;
        }
      } catch (err) {
        console.error('查询用户邮箱失败:', err);
        document.getElementById('emailDisplay').innerHTML = '<span class="no-email">查询失败，请使用 ?email= 参数</span>';
        document.getElementById('btnGet').disabled = true;
      }
    }

    // ==================== 获取验证码 ====================
    async function getCode() {
      if (!currentEmail) return;

      const btn = document.getElementById('btnGet');
      const codeArea = document.getElementById('codeArea');
      const errorArea = document.getElementById('errorArea');

      // 重置状态
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>正在获取...';
      codeArea.classList.remove('show');
      errorArea.classList.remove('show');

      try {
        const res = await fetch(`${API_BASE}/get-code?email=${encodeURIComponent(currentEmail)}`);
        const data = await res.json();

        if (data.success && data.code) {
          // 显示验证码
          document.getElementById('codeValue').textContent = data.code;
          codeArea.classList.add('show');

          // 自动复制到剪贴板
          await navigator.clipboard.writeText(data.code);
          document.getElementById('copyHint').textContent = '已自动复制到剪贴板';
          document.getElementById('copyHint').classList.add('copied');

          // 3秒后恢复提示文字
          setTimeout(() => {
            document.getElementById('copyHint').textContent = '点击验证码可复制';
            document.getElementById('copyHint').classList.remove('copied');
          }, 3000);
        } else {
          // 显示错误
          document.getElementById('errorMsg').textContent = data.error || '获取验证码失败，请稍后再试';
          errorArea.classList.add('show');
        }
      } catch (err) {
        console.error('请求失败:', err);
        document.getElementById('errorMsg').textContent = '网络请求失败，请检查网络连接后重试';
        errorArea.classList.add('show');
      } finally {
        // 恢复按钮
        btn.disabled = false;
        btn.textContent = '获取验证码';
      }
    }

    // ==================== 手动复制验证码 ====================
    async function copyCode() {
      const code = document.getElementById('codeValue').textContent;
      try {
        await navigator.clipboard.writeText(code);
        document.getElementById('copyHint').textContent = '已复制到剪贴板';
        document.getElementById('copyHint').classList.add('copied');
        setTimeout(() => {
          document.getElementById('copyHint').textContent = '点击验证码可复制';
          document.getElementById('copyHint').classList.remove('copied');
        }, 2000);
      } catch (err) {
        // 降级方案：选中文本
        const range = document.createRange();
        range.selectNodeContents(document.getElementById('codeValue'));
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.getElementById('copyHint').textContent = '请手动复制选中的文字';
      }
    }
  </script>
</body>
</html>
